<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#f1f5f9"/>

  <!-- Perch line -->
  <line x1="40" y1="330" x2="360" y2="330" stroke="#334155" stroke-width="6" stroke-linecap="round"/>

  <!-- Feet -->
  <line x1="160" y1="295" x2="160" y2="330" stroke="#334155" stroke-width="5" stroke-linecap="round"/>
  <line x1="240" y1="295" x2="240" y2="330" stroke="#334155" stroke-width="5" stroke-linecap="round"/>

  <!-- Body outline -->
  <ellipse cx="200" cy="235" rx="90" ry="105" fill="none" stroke="#334155" stroke-width="4"/>

  <!-- Left wing -->
  <path d="M130 200 Q95 220 95 270 Q95 295 115 300" fill="none" stroke="#334155" stroke-width="4" stroke-linecap="round"/>

  <!-- Right wing -->
  <path d="M270 200 Q305 220 305 270 Q305 295 285 300" fill="none" stroke="#334155" stroke-width="4" stroke-linecap="round"/>

  <!-- Belly dots - top row 2 -->
  <circle cx="185" cy="270" r="5" fill="#334155"/>
  <circle cx="215" cy="270" r="5" fill="#334155"/>

  <!-- Belly dots - bottom row 4 -->
  <circle cx="170" cy="288" r="5" fill="#334155"/>
  <circle cx="200" cy="288" r="5" fill="#334155"/>
  <circle cx="230" cy="288" r="5" fill="#334155"/>

  <!-- Head outline -->
  <ellipse cx="200" cy="145" rx="82" ry="75" fill="none" stroke="#334155" stroke-width="4"/>

  <!-- Left eye -->
  <circle cx="168" cy="140" r="26" fill="none" stroke="#334155" stroke-width="4"/>
  <circle cx="168" cy="140" r="11" fill="#334155"/>

  <!-- Right eye -->
  <circle cx="232" cy="140" r="26" fill="none" stroke="#334155" stroke-width="4"/>
  <circle cx="232" cy="140" r="11" fill="#334155"/>

  <!-- Beak -->
  <path d="M200 152 L188 178 Q200 188 212 178 Z" fill="#334155"/>

  <!-- Left ear tuft -->
  <path d="M138 90 Q148 65 162 78" fill="none" stroke="#334155" stroke-width="4" stroke-linecap="round"/>

  <!-- Right ear tuft -->
  <path d="M262 90 Q252 65 238 78" fill="none" stroke="#334155" stroke-width="4" stroke-linecap="round"/>

  <!-- Graduation cap - board (diamond perspective) -->
  <path d="M108 88 L200 58 L292 88 L200 100 Z" fill="none" stroke="#334155" stroke-width="4" stroke-linejoin="round"/>

  <!-- Cap band -->
  <path d="M120 100 Q200 82 280 100" fill="none" stroke="#334155" stroke-width="4" stroke-linecap="round"/>

  <!-- Tassel -->
  <line x1="200" y1="58" x2="270" y2="95" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
  <circle cx="270" cy="95" r="6" fill="#334155"/>
</svg>